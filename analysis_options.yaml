# Dart static analysis + formatting configuration.
# Run `flutter analyze` to lint, `dart format .` to format.
# Formatting line length is set below; pass it explicitly:
#   dart format --line-length 100 .

include: package:flutter_lints/flutter.yaml

analyzer:
  # Treat missing-return and dead-code as errors, not just warnings.
  errors:
    missing_return: error
    dead_code: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - lib/l10n/generated/**

formatter:
  # Matches the page-width used by dart format and IDEs.
  page_width: 100

linter:
  rules:
    # ── Style ────────────────────────────────────────────────────────────────
    prefer_single_quotes: true
    directives_ordering: true
    sort_constructors_first: true

    # ── Safety ───────────────────────────────────────────────────────────────
    avoid_print: true
    avoid_dynamic_calls: true
    cancel_subscriptions: true
    close_sinks: true

    # ── Flutter-specific ─────────────────────────────────────────────────────
    use_full_hex_values_for_flutter_colors: true
    sized_box_for_whitespace: true
    avoid_unnecessary_containers: true
