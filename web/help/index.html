<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SilverTimer — Help</title>
  <script>
    // Detect browser language and redirect to the matching sub-page.
    // Supported: en, de, fr, es. Falls back to English.
    (function () {
      var lang = (navigator.language || navigator.userLanguage || 'en')
                   .toLowerCase()
                   .split('-')[0];
      var supported = ['en', 'de', 'fr', 'es'];
      window.location.replace('./' + (supported.indexOf(lang) !== -1 ? lang : 'en') + '/');
    })();
  </script>
  <style>
    body { font-family: sans-serif; padding: 32px; max-width: 400px; margin: 0 auto; }
    h1 { font-size: 1.2rem; margin-bottom: 16px; }
    ul { padding-left: 20px; }
    li { margin-bottom: 8px; }
    a { color: #6750a4; }
  </style>
</head>
<body>
  <!-- Shown only if JavaScript is disabled -->
  <noscript>
    <h1>SilverTimer — Help / Hilfe / Aide / Ayuda</h1>
    <ul>
      <li><a href="./en/">English</a></li>
      <li><a href="./de/">Deutsch</a></li>
      <li><a href="./fr/">Français</a></li>
      <li><a href="./es/">Español</a></li>
    </ul>
  </noscript>
</body>
</html>
