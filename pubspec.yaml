name: silvertimer_flutter
description: "Colloidal silver electrolysis timer calculator"
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.3

  # Data Freezing & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Local Storage - History
  drift: ^2.20.2
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.24

  # Local Storage - Settings
  shared_preferences: ^2.3.3

  # Notifications & alarm sound
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  audioplayers: ^6.1.0

  # Platform detection
  universal_platform: ^1.1.0

  # Internationalization (date formatting)
  intl: ^0.20.2

  # UI
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3

  # Icons
  cupertino_icons: ^1.0.8

  # Info screen
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.20.2
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/sounds/
    - assets/images/
