name: silvertimer_flutter
description: "Colloidal silver electrolysis timer calculator"
publish_to: 'none'

version: 2.1.4+40

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Navigation
  go_router: ^17.3.0

  # Data Freezing & Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Local Storage - History
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0

  # Local Storage - Settings
  shared_preferences: ^2.3.3

  # Notifications & alarm sound
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  audioplayers: ^6.1.0

  # Platform detection
  universal_platform: ^1.1.0

  # Internationalization (date formatting)
  intl: ^0.20.2

  # UI
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3

  # Icons
  cupertino_icons: ^1.0.8

  # Info screen
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.4
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  drift_dev: ^2.34.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/sounds/
    - assets/images/
