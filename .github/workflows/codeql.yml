name: CodeQL Analysis

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze-swift:
    name: Analyze Swift (iOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Generate Flutter iOS artifacts
        # flutter build ios generates the Flutter engine framework,
        # GeneratedPluginRegistrant.swift, and SPM-resolved packages that
        # xcodebuild needs. CodeQL cannot trace Swift through Flutter's
        # build wrapper, so we run a second xcodebuild directly below.
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          flutter build ios --no-codesign

      - name: Build Swift for CodeQL tracing
        # A fresh derivedDataPath forces xcodebuild to recompile all Swift
        # sources so CodeQL can intercept every swiftc invocation.
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath /tmp/codeql-derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: swift

  analyze-android:
    name: Analyze Android (Kotlin)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build Android
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          flutter build apk --debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: java-kotlin
