name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/deploy-web.yml'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history required so annotated tags can be pushed (shallow
          # clones cannot push tag objects).
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compile Drift web worker
        # web/drift_worker.dart is committed source; the compiled JS is gitignored
        # and must be generated here so flutter build web picks it up from web/.
        run: dart compile js web/drift_worker.dart -o web/drift_worker.dart.js

      - name: Build web
        run: |
          flutter build web --release \
            --base-href /silvertimer_flutter/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: gh-pages
          # Keep the CNAME file if a custom domain is configured later
          keep_files: false

      # ── Auto-tag ────────────────────────────────────────────────────────────
      # Creates an annotated git tag vX.Y.Z on main after every successful
      # deploy. Idempotent: skips silently if the tag already exists, so
      # re-running the workflow manually is safe.
      - name: Create release tag
        run: |
          RAW=$(grep -E '^version: ' pubspec.yaml | sed 's/version: //')
          TAG="v${RAW%%+*}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on remote — skipping."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "✓ Tagged $TAG"
          fi
